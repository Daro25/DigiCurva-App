<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña - DigiCurva</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <style>
        /* --- RESET Y BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            width: 100%; 
            min-height: 100vh; 
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- FONDO --- */
        .background-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background-image: url('./assets/fondoHome.jpg'); /* Ruta de tu proyecto */
            background-size: cover; background-position: center;
            background-color: #87CEEB; /* Fallback */
        }
        .background-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(to bottom, rgba(100, 200, 255, 0.5), rgba(135, 206, 235, 0.7));
        }

        /* --- LAYOUT --- */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* --- HEADER --- */
        .header {
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: auto; 
        }
        
        .logo-container { 
            display: flex; 
            align-items: center; 
            gap: 10px;
        }
        
        .logo-icon {
            width: 45px; 
            height: 45px; 
            background: linear-gradient(135deg, #003b8e, #0056b3); 
            border-radius: 12px;
            display: flex; 
            justify-content: center; 
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .logo-icon ion-icon { color: white; font-size: 28px; }
        
        .logo-text {
            font-family: 'Lilita One', cursive;
            font-size: 36px; 
            color: #fff; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }
        
        .nav-links {
            display: flex;
            gap: 25px;
        }
        .nav-link { 
            font-size: 16px; 
            font-weight: 600; 
            color: #111; 
            text-decoration: none; 
            cursor: pointer; 
            transition: color 0.2s;
        }
        .nav-link:hover { color: #0056b3; }

        /* --- CONTENEDOR CENTRAL (MODAL) --- */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding-bottom: 10vh;
        }

        .recovery-card {
            background-color: rgba(245, 248, 250, 0.95); 
            border-radius: 20px; 
            padding: 50px 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 700px; 
            border: 1px solid rgba(255,255,255,0.6);
        }

        .card-title {
            font-family: 'Lilita One', cursive;
            font-size: 46px;
            color: #000;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* --- FORMULARIO --- */
        .form-section {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 16px;
            color: #222;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-row {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .input-field {
            flex: 1;
            max-width: 350px; /* Limita el ancho del input para que coincida con el diseño */
            padding: 14px 15px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-field:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-submit {
            background-color: #2563eb; 
            color: white;
            font-size: 16px;
            font-weight: 500;
            padding: 14px 35px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 140px;
            height: 50px; /* Misma altura que el input */
        }
        .btn-submit:hover { background-color: #1d4ed8; }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { background-color: #93c5fd; cursor: not-allowed; }

        /* Errores */
        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        /* Spinner de carga para el botón */
        .spinner {
            border: 3px solid rgba(255,255,255,0.3); 
            border-radius: 50%; 
            border-top: 3px solid #fff;
            width: 20px; height: 20px; 
            animation: spin 1s linear infinite; 
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .recovery-card { padding: 40px 25px; }
            .card-title { font-size: 32px; }
            
            /* En móvil apilamos el botón debajo del primer input por UX, 
               aunque en desktop respetamos el diseño original */
            .input-row { flex-direction: column; width: 100%; }
            .input-field { max-width: 100%; width: 100%; }
            .btn-submit { width: 100%; margin-top: 10px; }
            
            .logo-text { font-size: 28px; }
            .nav-links { gap: 15px; }
        }
    </style>
</head>
<body>

    <div class="background-container"></div>
    <div class="background-overlay"></div>

    <div class="container">
        
        <header class="header">
            <div class="logo-container">
                <div class="logo-icon">
                    <ion-icon name="phone-portrait-outline"></ion-icon>
                </div>
                <span class="logo-text">DigiCurva</span>
            </div>
            <nav class="nav-links">
                <a href="login.html" class="nav-link">Acceder</a>
                <a href="registro.html" class="nav-link">Registrarse</a>
            </nav>
        </header>

        <main class="main-content">
            <div class="recovery-card">
                <h1 class="card-title">Recuperación de cuenta</h1>
                
                <form id="newPasswordForm" onsubmit="handlePasswordUpdate(event)">
                    
                    <div class="form-section">
                        <label class="input-label" for="pass1">Escriba su nueva contraseña:</label>
                        <div class="input-row">
                            <input type="password" id="pass1" class="input-field" required>
                            <button type="submit" id="submitBtn" class="btn-submit">
                                <span id="btnText">Continuar</span>
                                <div id="btnSpinner" class="spinner"></div>
                            </button>
                        </div>
                    </div>

                    <div class="form-section">
                        <label class="input-label" for="pass2">Re-escriba su nueva contraseña:</label>
                        <div class="input-row">
                            <input type="password" id="pass2" class="input-field" required>
                        </div>
                        <div id="errorMsg" class="error-msg">Las contraseñas no coinciden.</div>
                    </div>
                    
                </form>
            </div>
        </main>

    </div>

    <script>
        // CONFIGURACIÓN
        async function cargarConfiguracion() {
            const respuesta = await fetch('config.json');
            const config = await respuesta.json();
            return config;
        }
        var configures = [];
        var API_BASE_URL = 'https://tudominio.com/api'; // Ajusta esto
        const ENDPOINT_NUEVA_PASS = '/actualizar_password.php';

        // --- LÓGICA DEL FORMULARIO ---
        async function handlePasswordUpdate(event) {
            event.preventDefault(); // Evita recargar la página
            configures = await cargarConfiguracion();
            API_BASE_URL = configures.base_url ?? API_BASE_URL;
            const pass1 = document.getElementById('pass1');
            const pass2 = document.getElementById('pass2');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const errorMsg = document.getElementById('errorMsg');

            // Validación: Coincidencia de contraseñas
            if (pass1.value !== pass2.value) {
                errorMsg.style.display = 'block';
                pass2.focus();
                return;
            } else {
                errorMsg.style.display = 'none';
            }

            // Datos estructurados en JSON
            // (Asumiendo que obtienes un token de la URL, por ejemplo ?token=abcd)
            const urlParams = new URLSearchParams(window.location.search);
            const tokenRecuperacion = urlParams.get('token') || '';

            const payload = {
                nueva_password: pass1.value,
                token: tokenRecuperacion
            };

            // UI: Estado de carga
            pass1.disabled = true;
            pass2.disabled = true;
            submitBtn.disabled = true;
            btnText.style.display = 'none';
            btnSpinner.style.display = 'block';

            try {
                // Envío de datos como JSON usando fetch
                const response = await fetch(`${API_BASE_URL}${ENDPOINT_NUEVA_PASS}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.success) {
                        alert('¡Contraseña actualizada con éxito! Ya puedes iniciar sesión.');
                        window.location.href = 'login.html'; // Redirigir al login
                    }
                    else {
                        alert(data.error+'\nseguramente tu link no es valido.');
                    }
                } else {
                    console.warn("Fallo al actualizar", response.status);
                    alert('Ocurrió un error al actualizar la contraseña. El enlace podría haber caducado.');
                }

            } catch (error) {
                console.error("Error en la petición:", error.message);
                // Simulación visual en caso de que no haya backend
                setTimeout(() => {
                    alert('Contraseña actualizada (Simulación). Redirigiendo a Login...');
                    window.location.href = 'login.html';
                }, 1000);
            } finally {
                // UI: Restaurar estado original (si no redirige)
                pass1.disabled = false;
                pass2.disabled = false;
                submitBtn.disabled = false;
                btnText.style.display = 'block';
                btnSpinner.style.display = 'none';
            }
        }
    </script>
</body>
</html>
