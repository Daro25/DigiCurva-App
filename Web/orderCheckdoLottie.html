<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .order-check{
            position: relative;
            width: 200px;
            height: 200px;
        }
        .order-check>dotlottie-wc{
            z-index: 2;
            position: absolute;
        }
        .order-check>svg{
            z-index: 1;
            top: 5px;
            left: 5px;
            position: absolute;
        }
    </style>
</head>
<body>
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.3/dist/dotlottie-wc.js" type="module"></script>
    <div id="order-check1" class="order-check">
        <svg width="190" height="190" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
        id="salvadorLottieOrder1">
            <rect x="4" y="7" width="16" height="15" rx="3" ry="3" stroke="black" stroke-width="2" fill="none"/>
            <path d="M9 7V5C9 3.34315 10.3431 2 12 2C13.6569 2 15 3.34315 15 5V7" stroke="black" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <dotlottie-wc src="https://lottie.host/74470812-d02e-426a-bbee-0e97684b841a/WasizIdWSK.lottie" 
        style="width: 200px;height: 200px;"
        id="dottieOrder1"></dotlottie-wc>
    </div>
    
    <input type="button" value="play" onclick="LottieOCplay(1)">
    <input type="button" value="Play step1" onclick="LottieOCplayStp1(1)">
    <input type="button" value="reload" onclick="LottieOCreload(1)">
    <input type="button" value="step1" onclick="LottieOCstep1(1)">
    <script>
    function LottieOCplay(id) {
        const dottie = document.getElementById('dottieOrder'+id);
        const animation = dottie.dotLottie;
        animation.setSegment(0,150);
        animation.play();
    }
    function LottieOCplayStp1(id) {
        const dottie = document.getElementById('dottieOrder'+id);
        const animation = dottie.dotLottie;
        document.getElementById('salvadorLottieOrder'+id).style.display = 'none';
        animation.setSegment(0,38);
        animation.play();
    }
    function LottieOCreload(id) {
        const dottie = document.getElementById('dottieOrder'+id);
        const animation = dottie.dotLottie;
        animation.play(0);
        animation.stop();
    }
    function LottieOCstep1(id) {
        const dottie = document.getElementById('dottieOrder'+id);
        const animation = dottie.dotLottie;
        animation.setFrame(38);
    }
    </script>
</body>
</html>
