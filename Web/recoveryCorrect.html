<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifique su correo - DigiCurva</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <style>
        /* --- RESET Y BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            width: 100%; 
            min-height: 100vh; 
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- FONDO --- */
        .background-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background-image: url('./assets/fondoHome.jpg'); /* Ruta de tu proyecto */
            background-size: cover; background-position: center;
            background-color: #87CEEB; /* Fallback */
        }
        .background-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(to bottom, rgba(100, 200, 255, 0.5), rgba(135, 206, 235, 0.7));
        }

        /* --- LAYOUT --- */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* --- HEADER --- */
        .header {
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: auto; 
        }
        
        .logo-container { 
            display: flex; 
            align-items: center; 
            gap: 10px;
        }
        
        .logo-icon {
            width: 45px; 
            height: 45px; 
            background: linear-gradient(135deg, #003b8e, #0056b3); 
            border-radius: 12px;
            display: flex; 
            justify-content: center; 
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .logo-icon ion-icon { color: white; font-size: 28px; }
        
        .logo-text {
            font-family: 'Lilita One', cursive;
            font-size: 36px; 
            color: #fff; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }
        
        .nav-links {
            display: flex;
            gap: 25px;
        }
        .nav-link { 
            font-size: 16px; 
            font-weight: 600; 
            color: #111; 
            text-decoration: none; 
            cursor: pointer; 
            transition: color 0.2s;
        }
        .nav-link:hover { color: #0056b3; }

        /* --- CONTENEDOR CENTRAL (MODAL) --- */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding-bottom: 10vh;
        }

        .recovery-card {
            background-color: rgba(245, 248, 250, 0.95); 
            border-radius: 20px; 
            padding: 50px 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 700px; 
            border: 1px solid rgba(255,255,255,0.6);
        }

        .card-title {
            font-family: 'Lilita One', cursive;
            font-size: 46px;
            color: #000;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .card-text {
            font-size: 20px;
            color: #111;
            line-height: 1.5;
            font-weight: 400;
        }

        /* Botón extra por temas de UX (opcional) */
        .btn-action {
            display: inline-block;
            margin-top: 30px;
            background-color: transparent;
            color: #2563eb;
            font-size: 16px;
            font-weight: 600;
            padding: 10px 20px;
            border: 2px solid #2563eb;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-action:hover {
            background-color: #2563eb;
            color: white;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .recovery-card { padding: 40px 25px; text-align: center; }
            .card-title { font-size: 32px; text-align: center; }
            .card-text { font-size: 18px; text-align: center; }
            .logo-text { font-size: 28px; }
            .nav-links { gap: 15px; }
            .btn-action { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="background-container"></div>
    <div class="background-overlay"></div>

    <div class="container">
        
        <header class="header">
            <div class="logo-container">
                <div class="logo-icon">
                    <ion-icon name="phone-portrait-outline"></ion-icon>
                </div>
                <span class="logo-text">DigiCurva</span>
            </div>
            <nav class="nav-links">
                <a href="login.html" class="nav-link">Acceder</a>
                <a href="registro.html" class="nav-link">Registrarse</a>
            </nav>
        </header>

        <main class="main-content">
            <div class="recovery-card">
                <h1 class="card-title">Verifique su correo</h1>
                <p class="card-text">
                    Le hemos enviado un enlace de recuperación a su correo, favor de abrirlo para continuar con su recuperación.
                </p>
                
                <a href="login.html" class="btn-action">Volver al inicio</a>
            </div>
        </main>

    </div>

</body>
</html>
