<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>addCar</title>
</head>
<style>
    body {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        height: auto;
        width: auto;
        background-color: #f0f0f0;
        border: 0;
        margin: 0;
        padding: 0;
    }
    form {
        justify-content: center;
        align-items: center; 
        background-color: white; 
        border-radius: 20px;
        height: 320px;
        width: 360px;
        position: relative;
        display: none;
        flex-direction: row;
        overflow: hidden;
    }
    h1 {
        text-align: center;
        margin-top: 20px;
    }
    section {
        display: inline-block;
        width: auto;
        overflow-x: hidden;
        position: relative;
    }
    img{
        border-radius: 10px;
        max-height: 140px;
    }
    .box-img {
        position: absolute;
        display: block;
        top: 2px;
        left: 50%;
        transform: translate(-50%, 0);
        width: 120px;
        height: 140px;
        justify-content: center;
        background-color: transparent;
        border-radius: 10px;
        box-shadow: inset 0 0 8px 8px white;
    }
    input{
        display: inline-block;
    }
    input[type="number"] {
        text-align: center;
        min-width: 10px;
    }
    input[type="button"] {
        width: auto;
        height: auto;
        text-align: center;
    }
    input[hidden] {
        display: none;
    }
    #costo {
        font-size: 24px; 
        font-weight: bold;
    }
    .sectionA {
        text-align: center;
    }
    .sectionB {
        text-align: justify;
        flex-direction: column;
    }
    figure {
        display: block;
        position: relative;
        width: 150px;
        height: 150px;
        background-color: white;
        box-shadow: 0 4px 8px #0000003a;
        border-radius: 20px;
        overflow: hidden;
        padding-top: 2px;
    }
    button{
        background-color: #2563eb; 
        color: white; 
        padding: 10px; 
        border: none; 
        border-radius: 5px; 
        cursor: pointer;
        margin-top: 5px;
        margin-right: 10px;
    }
    /* --- PANTALLA DE CARGA --- */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 10px; color: #666;">Cargando Carrito...</p>
    </div>
    <form id="app-container">
        <h1 id="product-title">Producto</h1>
        <input type="number" name="price" id="product-price" hidden>
        <input type="number" name="producto_id" id="producto_id" hidden>
        <input type="number" name="cantidad" id="producto_cantidad" value="1" hidden>
        <section class="sectionA">
            <figure>
                <div class="box-img"></div>
                <img src="#" id="mainImage" height="auto" width="120px">
            </figure>
            <p id="product-exist">.....</p>
        </section>
        <section class="sectionB">
            <label for="cantidad">Cantidad: </label><br>
            <input type="button" value="-" onclick="decreaseCount()">
            <input type="number" name="cantidad" id="product-count"
            disabled="false" readonly="true"
            min="1" max="100" value="1" oninput="handleCantidad()">
            <input type="button" value="+" onclick="increaseCount()">
            <p id="costo">$00</p><br>
            <button type="button" onclick="addToCart()">Añadir al carrito</button>
        </section>
    </form>
<script>
    async function cargarConfiguracion() {
        const respuesta = await fetch('config.json');
        const config = await respuesta.json();
        return config;
    }

    var configures = await cargarConfiguracion();
    var API_BASE_URL = configures.base_url || 'http://xampp.local/DigiCurvaServer/'//'https://ljusstudie.site/DigiCurvaServer';
    function increaseCount() {
        const countInput = document.getElementById('product-count');
        const max = parseInt(countInput.max);
        let value = parseInt(countInput.value);
        if (value < max) {
            countInput.value = value + 1;
            handleCantidad();
        }
    }
    function decreaseCount() {
        const countInput = document.getElementById('product-count');
        let value = parseInt(countInput.value);
        if (value > 1) {
            countInput.value = value - 1;
            handleCantidad();
        }
    }
    function handleCantidad(){
        const costoInput = document.getElementById('product-price');
        let value = document.getElementById('product-count').value;
        console.log(value);
        document.getElementById('producto_cantidad').value = value;
        document.getElementById('costo').textContent = '$'+(Number(costoInput.value) * value);
    }
        // --- 1. INICIALIZACIÓN ---
        window.addEventListener('load', () => {
            initApp();
        });
        async function initApp() {
            const producto = getProductFromURL();
            if (producto) {
                RenderData(producto);
                // Esperar 2 segundos (Lógica visual solicitada)
                await new Promise(resolve => setTimeout(resolve, 2000));
                // Ocultar loading y mostrar app
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
            } else {
                console.warn("No se pudo cargar el producto desde la URL.");
            }
        }
        function getProductFromURL() {
            try {
                // 1. Obtener el parámetro 'product' de la URL
                const urlParams = new URLSearchParams(window.location.search);
                const param = urlParams.get('product');
                if (!param) return null;
                // 2. Decodificar el componente de la URL (deshace el encodeURIComponent)
                const decodedParam = decodeURIComponent(param);
                // 3. Decodificar de Base64 a texto (deshace el btoa)
                const jsonString = atob(decodedParam);
                // 4. Convertir el texto JSON de nuevo a objeto (deshace el stringify)
                return JSON.parse(jsonString);
            } catch (error) {
                console.error("Error al desempaquetar el producto:", error);
                return null;
            }
        }
        function getUserFromURL() {
            try {
                // 1. Obtener el parámetro 'user' de la URL
                const urlParams = new URLSearchParams(window.location.search);
                const param = urlParams.get('user');
                if (!param) return null;
                // 2. Decodificar el componente de la URL (deshace el encodeURIComponent)
                const decodedParam = decodeURIComponent(param);
                // 3. Decodificar de Base64 a texto (deshace el btoa)
                const jsonString = atob(decodedParam);
                // 4. Convertir el texto JSON de nuevo a objeto (deshace el stringify)
                return JSON.parse(jsonString);
            } catch (error) {   
                console.error("Error al desempaquetar el usuario:", error);
                return null;
            }
        }
        function RenderData(producto) {
            console.log(producto);
            
            document.getElementById('product-title').textContent = producto.title;
            document.getElementById('product-price').value = producto.price;
            document.getElementById('product-count').max = producto.existencia;
            document.getElementById('producto_id').value = producto.producto_id;
            document.getElementById('costo').textContent = `$${producto.price}`;
            document.getElementById('product-exist').textContent = producto.existencia > 0 ? `Solo quedan ${producto.existencia}` : 'Agotado';
            document.getElementById('mainImage').src = producto.image; // Asumiendo que 'images' es un array de URLs
        }
        async function addToCart() {
            const formData = new FormData(document.getElementById('app-container'));
            try {
            const response = await fetch(API_BASE_URL + "agregarCarrito.php", {
                method: "POST",
                body: formData
            });
            const result = await response.json();
            console.log(result);
            if (result.success) {
                alert("Producto agregado al carrito exitosamente");
                // ✅ Notificar al padre que el carrito se actualizó
                window.parent.postMessage(
                { type: "carrito_actualizado", data: result },
                "*" // puedes reemplazar "*" por el dominio del padre para mayor seguridad
                );
            } else {
                alert("Error: " + result.error);
            }
            } catch (error) {
            console.error("Error en la petición:", error);
            alert("No se pudo conectar con el servidor");
            }
        }
</script>
</body>
</html>
